stages:
  - mirror

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"

mirror_to_github:
  stage: mirror
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  before_script:
    - apk add --no-cache git
  script:
    - test -n "$GITHUB_PAT" || { echo "Missing GITHUB_PAT CI/CD variable"; exit 1; }
    - test -n "$GITHUB_REPOSITORY" || { echo "Missing GITHUB_REPOSITORY CI/CD variable"; exit 1; }
    - export TARGET_BRANCH="${GITHUB_TARGET_BRANCH:-$CI_COMMIT_BRANCH}"
    - git config user.name "${GITLAB_USER_NAME:-gitlab-ci}"
    - git config user.email "${GITLAB_USER_EMAIL:-gitlab-ci@example.com}"
    - git remote add github "https://x-access-token:${GITHUB_PAT}@github.com/${GITHUB_REPOSITORY}.git"
    - git push github "HEAD:${TARGET_BRANCH}"
    - git push github --tags
